name: ilac_takip
description: Medication Tracker - İlaç Takip Uygulaması
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Local Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_timezone: ^3.0.1
  
  # Background Tasks
  workmanager: ^0.5.2
  
  # Date/Time
  intl: ^0.20.2
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  fl_chart: ^0.69.2
  
  # Utils
  uuid: ^4.2.2
  shared_preferences: ^2.2.2
  collection: ^1.18.0
  flutter_native_splash: ^2.4.7
  url_launcher: ^6.3.1

flutter_native_splash:
  color: "#060F0B"
  color_dark: "#060F0B"
  android_12:
    color: "#060F0B"
    color_dark: "#060F0B"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  # Özel fontlar (opsiyonel, Google Fonts'tan Poppins indirip aktifleştirin)
